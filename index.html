<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculadora Gong Fu Cha</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#415f4c">

<link rel="apple-touch-icon" href="icon-192.png">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

:root{
--bg:#f3eadb;
--card:#ffffff;
--text:#222;
--primary:#415f4c;
}

body.dark{
--bg:#121212;
--card:#1c1c1c;
--text:#f5f5f5;
}

body{
margin:0;
font-family:'Inter',system-ui;
background:var(--bg);
color:var(--text);
padding:20px;
transition:.3s;
}

h1,h2,h3{
font-family:'Playfair Display',serif;
margin-top:20px;
}

.container{
max-width:900px;
margin:auto;
background:var(--card);
padding:30px;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.15);
position:relative;
}

.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
}

.theme-btn{
background:none;
border:none;
cursor:pointer;
}

.user-menu{
position:absolute;
top:20px;
right:20px;
font-size:13px;
opacity:.8;
}

.user-menu button{
background:none;
border:none;
color:var(--primary);
cursor:pointer;
margin-left:8px;
}

.mem-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
gap:12px;
margin-bottom:20px;
}

.mem-card{
background:var(--card);
padding:14px;
border-radius:14px;
text-align:center;
cursor:pointer;
border:1px solid rgba(0,0,0,0.08);
box-shadow:0 3px 8px rgba(0,0,0,0.05);
transition:.2s;
}

body.dark .mem-card{
border:1px solid rgba(255,255,255,0.12);
box-shadow:0 4px 10px rgba(0,0,0,0.35);
}

.mem-card:hover{
transform:translateY(-2px);
box-shadow:0 10px 18px rgba(0,0,0,0.08);
}

body.dark .mem-card:hover{
box-shadow:0 12px 22px rgba(0,0,0,0.45);
}

.mem-card.selected{
border:1px solid var(--primary);
box-shadow:0 0 0 3px rgba(65,95,76,.25);
}

body.dark .mem-card.selected{
border:1px solid #6f8f7d;
box-shadow:0 0 0 3px rgba(111,143,125,.45);
}

.mem-card img{
height:32px;
margin-bottom:auto;
display:block;
margin-left:6px;
margin-right:auto;
}

.mem-card .nombre{
font-weight:600;
font-size:15px;
}

.mem-card .volumen{
font-size:12px;
opacity:.65;
margin-top:4px;
}

input,
select{

padding:12px;
border-radius:12px;
border:1px solid rgba(0,0,0,0.08);
font-size:14px;
background:#f7f5f0;
transition:.2s;
appearance:none;

}

input:focus,
select:focus{

outline:none;
border:1px solid var(--primary);
box-shadow:0 0 0 2px rgba(65,95,76,.15);

}

body.dark input,
body.dark select{

background:#1b1b1b;
border:1px solid rgba(255,255,255,0.12);
color:white;
}

.volume-row{
display:flex;
gap:10px;
margin-bottom:20px;
}

.add-btn{
width:44px;
height:44px;
border-radius:50%;
background:var(--primary);
color:white;
font-size:26px;
border:none;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
}

.result-box{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:16px;
margin-top:25px;
}

.result-card{
background:var(--primary);
color:white;
padding:20px;
border-radius:14px;
text-align:center;
}

.result-card strong{
font-size:28px;
display:block;
}

.footer{
margin-top:50px;
text-align:center;
font-size:15px;
}

.footer span{
display:block;
font-size:13px;
margin-top:5px;
opacity:.8;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.4);
display:flex;
justify-content:center;
align-items:center;
}

.modal.hidden{
display:none;
}

.modal-content{
background:white;
padding:20px;
border-radius:12px;
width:320px;
}

body.dark .modal-content{
background:#1e1e1e;
color:white;
}

.hidden{
display:none;
}

</style>

</head>

<body>

<div class="container">

<div class="top-bar">

<h2>🍵 Calculadora Gong Fu Cha</h2>

<button class="theme-btn" onclick="toggleDark()">
<img id="themeIcon" src="icons/moon.svg" width="20">
</button>

</div>

<div id="authSection">

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<button onclick="register()">Regístrate</button>

<button onclick="googleLogin()" style="background:#db4437;color:white">Google</button>

</div>

<div id="app" class="hidden">

<div class="user-menu">

<span id="userEmail"></span>

<button onclick="logout()">Salir</button>

</div>

<h3>Mis Teteras</h3>

<div id="memorias" class="mem-grid"></div>

<h3>Volumen</h3>

<div class="volume-row">

<input type="number" id="volumen" value="100" oninput="calcular()">

<button class="add-btn" onclick="abrirModal()">+</button>

</div>

<h3>Tipo de Té</h3>

<select id="tipoTe" onchange="calcular()">

<option value="5">Blanco (5g/110ml)</option>
<option value="4">Verde (4g/110ml)</option>
<option value="6">Amarillo (6g/110ml)</option>
<option value="7">Oolong (7g/110ml)</option>
<option value="8">Pu erh Sheng (8g/110ml)</option>
<option value="10">Pu erh Shou (10g/110ml)</option>
<option value="6">Negro (6g/110ml)</option>

</select>

<div class="result-box">

<div class="result-card">

<strong id="gramos">0</strong>

<span>Hojas de té</span>

</div>

<div class="result-card">

<strong id="agua">0</strong>

<span>Agua útil (ml)</span>

</div>

<div class="result-card">

<strong id="temp">-</strong>

<span>Temperatura</span>

</div>

</div>

</div>

<div class="footer">

<p>Aprende más sobre el té en Instagram @naciondelte
<span><a href="https://www.instagram.com/naciondelte/" target="_blank">Haz clic aquí</a></span>
</p>

<p>Únete a nuestra comunidad del té en Discord
<span><a href="https://discord.gg/mjzhCXBRW" target="_blank">Haz clic aquí</a></span>
</p>

</div>

</div>

<div id="modal" class="modal hidden">

<div class="modal-content">

<h3 id="modalTitle">Guardar Tetera</h3>

<input type="text" id="nombreTetera" placeholder="Nombre">

<input type="number" id="modalVol" placeholder="Volumen (ml)">

<select id="iconSelect">

<option value="">Sin icono</option>

<option value="teapot.png">Tetera</option>

<option value="gaiwan.png">Gaiwan</option>

</select>

<div style="margin-top:10px;display:flex;gap:10px">

<button onclick="guardarMemoria()">Aceptar</button>

<button onclick="eliminarMemoria()" style="background:#c0392b;color:white">Eliminar</button>

</div>

<button onclick="cerrarModal()" style="margin-top:10px">Cancelar</button>

</div>

</div>

<script>

function toggleDark(){

document.body.classList.toggle('dark');

const dark=document.body.classList.contains('dark');

document.getElementById("themeIcon").src=
dark ? "icons/sun.svg" : "icons/moon.svg";

localStorage.setItem('darkMode',dark);

}

if(localStorage.getItem('darkMode')==='true'){
document.body.classList.add('dark');
document.getElementById("themeIcon").src="icons/sun.svg";
}

</script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged, GoogleAuthProvider, signInWithPopup }

from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import { getFirestore, collection, addDoc, getDocs, deleteDoc, updateDoc, doc, query, orderBy }

from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig={

apiKey:"AIzaSyAnCT6glmf4n1zxzHJoHx4Z9l7yR0jju1I",
authDomain:"calc-gong-fu.firebaseapp.com",
projectId:"calc-gong-fu"

};

const appFirebase=initializeApp(firebaseConfig);

const auth=getAuth(appFirebase);

const db=getFirestore(appFirebase);

const provider=new GoogleAuthProvider();

let user=null;

let memorias=[];

let editId=null;

onAuthStateChanged(auth,async(u)=>{

if(u){

user=u;

authSection.classList.add("hidden");

app.classList.remove("hidden");

userEmail.innerText=u.email;

cargarMemorias();

}

else{

authSection.classList.remove("hidden");

app.classList.add("hidden");

}

});

window.login=()=>signInWithEmailAndPassword(auth,email.value,password.value);

window.register=()=>createUserWithEmailAndPassword(auth,email.value,password.value);

window.googleLogin=()=>signInWithPopup(auth,provider);

window.logout=()=>signOut(auth);

async function cargarMemorias(){

memorias=[];

const q=query(collection(db,"usuarios",user.uid,"teteras"),orderBy("orden"));

const snap=await getDocs(q);

snap.forEach(d=>memorias.push({...d.data(),id:d.id}));

render();

}

function render(){

const cont=document.getElementById("memorias");

cont.innerHTML="";

memorias.forEach(m=>{

const div=document.createElement("div");

div.className="mem-card";

const nombre=document.createElement("div");

nombre.className="nombre";

if(m.icon){

const icon=document.createElement("img");

icon.src="icons/"+m.icon;

nombre.appendChild(icon);

}

nombre.appendChild(document.createTextNode(m.nombre));

const volumen=document.createElement("div");

volumen.className="volumen";

volumen.textContent=m.vol+" ml";

div.appendChild(nombre);

div.appendChild(volumen);

div.onclick=()=>{

document.getElementById("volumen").value=m.vol;

calcular();

};

div.ondblclick=()=>abrirModalEdicion(m);

cont.appendChild(div);

});

}

window.abrirModal=()=>{

editId=null;

nombreTetera.value="";

modalVol.value=volumen.value;

iconSelect.value="";

modal.classList.remove("hidden");

}

function abrirModalEdicion(m){

editId=m.id;

nombreTetera.value=m.nombre;

modalVol.value=m.vol;

iconSelect.value=m.icon||"";

modal.classList.remove("hidden");

}

window.cerrarModal=()=>modal.classList.add("hidden");

window.guardarMemoria=async()=>{

const nombre=nombreTetera.value.trim();

const vol=parseFloat(modalVol.value);

const icon=iconSelect.value;

if(!nombre||!vol)return;

if(editId){

await updateDoc(doc(db,"usuarios",user.uid,"teteras",editId),{nombre,vol,icon});

}

else{

await addDoc(collection(db,"usuarios",user.uid,"teteras"),{nombre,vol,icon,orden:memorias.length});

}

cerrarModal();

cargarMemorias();

}

window.eliminarMemoria=async()=>{

if(!editId)return;

await deleteDoc(doc(db,"usuarios",user.uid,"teteras",editId));

cerrarModal();

cargarMemorias();

}

window.calcular=()=>{

const vol=parseFloat(volumen.value);

const ratio=parseFloat(tipoTe.value)/110;

const desp=3.2;

const gCalc=(vol*ratio)/(1+ratio*desp);

const aCalc=vol-(gCalc*desp);

gramos.innerText=gCalc.toFixed(2);

agua.innerText=aCalc.toFixed(1);

temp.innerText="90°C";

}

calcular();

</script>

</body>
</html>
