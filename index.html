<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculadora Gong Fu Cha</title>

<link rel="manifest" href="manifest.json">

<style>

:root{
--bg:#f4f6fb;
--card:#ffffff;
--text:#222;
--primary:#667eea;
}

body.dark{
--bg:#121212;
--card:#1e1e1e;
--text:#f5f5f5;
}

body{
margin:0;
font-family:system-ui;
background:var(--bg);
color:var(--text);
padding:20px;
transition:.25s;
}

.container{
max-width:900px;
margin:auto;
background:var(--card);
padding:30px;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,.15);
}

.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.mem-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
gap:12px;
margin-bottom:20px;
}

.mem-card{
background:#eaeaea;
padding:12px;
border-radius:12px;
text-align:center;
user-select:none;
border:2px solid transparent;
transition:transform .18s ease;
}

body.dark .mem-card{
background:#2a2a2a;
}

.mem-card.dragging{
transform:scale(1.05);
box-shadow:0 12px 25px rgba(0,0,0,.3);
}

.mem-card.selected{
border:2px solid var(--primary);
}

.nombre{
font-weight:600;
margin-bottom:6px;
}

.volumen{
font-size:13px;
border-top:1px solid rgba(0,0,0,.2);
padding-top:6px;
}

input,select,button{
padding:10px;
border-radius:8px;
border:1px solid #ddd;
font-size:14px;
}

button{
background:var(--primary);
color:white;
border:none;
cursor:pointer;
font-weight:bold;
}

.volume-row{
display:flex;
gap:10px;
margin-bottom:20px;
}

.volume-row input{
flex:1;
}

.result-box{
background:var(--primary);
color:white;
padding:20px;
border-radius:12px;
margin-top:20px;
}

.hidden{
display:none;
}

</style>

</head>

<body>

<div class="container">

<div class="top-bar">
<h2>🍵 Calculadora Gong Fu Cha</h2>
<button onclick="toggleDark()">🌙</button>
</div>

<div id="authSection">

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>
<button onclick="register()">Regístrate</button>
<button onclick="googleLogin()">Google</button>

</div>

<div id="app" class="hidden">

<h3>Mis Teteras</h3>
<div id="memorias" class="mem-grid"></div>

<h3>Volumen</h3>

<div class="volume-row">
<input id="volumen" type="number" value="100" oninput="calcular()">
</div>

<h3>Tipo de Té</h3>

<select id="tipoTe" onchange="calcular()">

<option value="5">Blanco (5 g / 110 ml)</option>
<option value="4">Verde (4 g / 110 ml)</option>
<option value="6">Amarillo (6 g / 110 ml)</option>
<option value="7">Oolong (7 g / 110 ml)</option>
<option value="8">Pu erh Sheng (8 g / 110 ml)</option>
<option value="10">Pu erh Shou (10 g / 110 ml)</option>
<option value="6">Negro (6 g / 110 ml)</option>

</select>

<div class="result-box">

<p>Gramos de té: <strong id="gramos">0</strong> g</p>
<p>Agua útil: <strong id="agua">0</strong> ml</p>
<p>Temperatura recomendada: <strong id="temp">-</strong></p>

</div>

</div>

</div>

<script>

function toggleDark(){
document.body.classList.toggle("dark")
localStorage.setItem("darkMode",document.body.classList.contains("dark"))
}

if(localStorage.getItem("darkMode")==="true"){
document.body.classList.add("dark")
}

</script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"

const firebaseConfig={
apiKey:"AIzaSyAnCT6glmf4n1zxzHJoHx4Z9l7yR0jju1I",
authDomain:"calc-gong-fu.firebaseapp.com",
projectId:"calc-gong-fu"
}

const firebaseApp=initializeApp(firebaseConfig)
const auth=getAuth(firebaseApp)
const provider=new GoogleAuthProvider()

onAuthStateChanged(auth,(user)=>{

if(user){

document.getElementById("authSection").style.display="none"
document.getElementById("app").style.display="block"

}else{

document.getElementById("authSection").style.display="block"
document.getElementById("app").style.display="none"

}

})

window.login=()=>signInWithEmailAndPassword(auth,email.value,password.value)
window.register=()=>createUserWithEmailAndPassword(auth,email.value,password.value)
window.googleLogin=()=>signInWithPopup(auth,provider)

window.calcular=()=>{

const vol=parseFloat(volumen.value)
const ratio=parseFloat(tipoTe.value)/110

const desp=3.2

const g=(vol*ratio)/(1+ratio*desp)
const a=vol-(g*desp)

gramos.innerText=g.toFixed(2)
agua.innerText=a.toFixed(2)

const temps={
Blanco:"85-95°C",
Verde:"80-85°C",
Amarillo:"80-90°C",
Oolong:"100°C",
Pu:"95°C",
Negro:"95°C"
}

const name=tipoTe.options[tipoTe.selectedIndex].text

if(name.includes("Blanco"))temp.innerText="85-95°C"
if(name.includes("Verde"))temp.innerText="80-85°C"
if(name.includes("Amarillo"))temp.innerText="80-90°C"
if(name.includes("Oolong"))temp.innerText="100°C"
if(name.includes("Sheng"))temp.innerText="95°C"
if(name.includes("Shou"))temp.innerText="100°C"
if(name.includes("Negro"))temp.innerText="95°C"

}

calcular()

</script>

</body>
</html>
