<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora Gong Fu Cha</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#667eea">

<style>

:root{
--bg:#f4f6fb;
--card:#ffffff;
--text:#222;
--primary:#667eea;
}

body.dark{
--bg:#121212;
--card:#1e1e1e;
--text:#f5f5f5;
}

body{
margin:0;
font-family:system-ui;
background:var(--bg);
color:var(--text);
padding:20px;
transition:.3s;
}

.container{
max-width:900px;
margin:auto;
background:var(--card);
padding:30px;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,.15);
}

.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.mem-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
gap:12px;
margin-bottom:20px;
}

.mem-card{
background:#eaeaea;
padding:12px;
border-radius:12px;
text-align:center;
user-select:none;
border:2px solid transparent;
transition:transform .25s, box-shadow .25s;
}

body.dark .mem-card{
background:#2a2a2a;
}

.mem-card.dragging{
opacity:.8;
box-shadow:0 10px 20px rgba(0,0,0,.3);
}

.mem-card.selected{
border:2px solid var(--primary);
}

.mem-card .nombre{
font-weight:600;
margin-bottom:6px;
}

.mem-card .volumen{
font-size:13px;
border-top:1px solid rgba(0,0,0,.2);
padding-top:6px;
}

input,select,button{
padding:10px;
border-radius:8px;
border:1px solid #ddd;
font-size:14px;
}

button{
background:var(--primary);
color:white;
border:none;
cursor:pointer;
font-weight:bold;
}

.small-btn{
padding:6px 10px;
font-size:13px;
}

.volume-row{
display:flex;
gap:10px;
margin-bottom:20px;
}

.volume-row input{
flex:1;
}

.result-box{
background:var(--primary);
color:white;
padding:20px;
border-radius:12px;
margin-top:20px;
}

.hidden{
display:none;
}

.footer{
margin-top:50px;
text-align:center;
}

.footer a{
color:var(--primary);
font-weight:bold;
text-decoration:underline;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.4);
display:flex;
justify-content:center;
align-items:center;
}

.modal.hidden{
display:none;
}

.modal-content{
background:white;
padding:20px;
border-radius:12px;
width:320px;
}

body.dark .modal-content{
background:#1e1e1e;
color:white;
}

</style>
</head>

<body>

<div class="container">

<div class="top-bar">
<h2>🍵 Calculadora Gong Fu Cha</h2>
<button onclick="toggleDark()" class="small-btn">🌙</button>
</div>

<div id="authSection">

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>
<button onclick="register()">Regístrate</button>
<button onclick="googleLogin()">Google</button>

</div>

<div id="app" class="hidden">

<h3>Mis Teteras</h3>
<div id="memorias" class="mem-grid"></div>

<h3>Volumen</h3>

<div class="volume-row">
<input id="volumen" type="number" value="100" oninput="calcular()">
<button onclick="abrirModal()">Guardar Tetera</button>
</div>

<h3>Tipo de Té</h3>

<select id="tipoTe" onchange="calcular()">
<option value="5">Blanco (5 g / 110 ml)</option>
<option value="4">Verde (4 g / 110 ml)</option>
<option value="6">Amarillo (6 g / 110 ml)</option>
<option value="7">Oolong (7 g / 110 ml)</option>
<option value="8">Pu erh Sheng (8 g / 110 ml)</option>
<option value="10">Pu erh Shou (10 g / 110 ml)</option>
<option value="6">Negro (6 g / 110 ml)</option>
</select>

<div class="result-box">

<p>Gramos de té: <strong id="gramos">0</strong> g</p>
<p>Agua útil: <strong id="agua">0</strong> ml</p>
<p>Temperatura recomendada: <strong id="temp">-</strong></p>

</div>

</div>

</div>

<script>

function toggleDark(){
document.body.classList.toggle("dark")
localStorage.setItem("darkMode",document.body.classList.contains("dark"))
}

if(localStorage.getItem("darkMode")==="true"){
document.body.classList.add("dark")
}

</script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"
import { getFirestore, collection, addDoc, getDocs, deleteDoc, updateDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"

const firebaseConfig={
apiKey:"AIzaSyAnCT6glmf4n1zxzHJoHx4Z9l7yR0jju1I",
authDomain:"calc-gong-fu.firebaseapp.com",
projectId:"calc-gong-fu"
}

const app=initializeApp(firebaseConfig)
const auth=getAuth(app)
const db=getFirestore(app)
const provider=new GoogleAuthProvider()

let user=null
let memorias=[]
let dragIndex=null

onAuthStateChanged(auth,async(u)=>{
if(u){

user=u
authSection.style.display="none"
appDiv.style.display="block"
cargarMemorias()

}else{

authSection.style.display="block"
appDiv.style.display="none"

}
})

window.login=()=>signInWithEmailAndPassword(auth,email.value,password.value)
window.register=()=>createUserWithEmailAndPassword(auth,email.value,password.value)
window.googleLogin=()=>signInWithPopup(auth,provider)

async function cargarMemorias(){

memorias=[]
const q=query(collection(db,"usuarios",user.uid,"teteras"),orderBy("orden"))
const snap=await getDocs(q)

snap.forEach(d=>memorias.push({...d.data(),id:d.id}))

render()

}

function render(){

const cont=document.getElementById("memorias")
cont.innerHTML=""

memorias.forEach((m,i)=>{

const card=document.createElement("div")
card.className="mem-card"
card.draggable=true

card.innerHTML=`
<div class="nombre">${m.nombre}</div>
<div class="volumen">${m.vol} ml</div>
`

card.onclick=()=>{
volumen.value=m.vol
calcular()
}

card.ondragstart=()=>{
dragIndex=i
card.classList.add("dragging")
}

card.ondragend=()=>{
card.classList.remove("dragging")
guardarOrden()
}

card.ondragover=(e)=>{
e.preventDefault()

const over=i

if(over!==dragIndex){

const moved=memorias.splice(dragIndex,1)[0]
memorias.splice(over,0,moved)

dragIndex=over

render()

}

}

cont.appendChild(card)

})

}

async function guardarOrden(){

for(let i=0;i<memorias.length;i++){

await updateDoc(
doc(db,"usuarios",user.uid,"teteras",memorias[i].id),
{orden:i}
)

}

}

window.calcular=()=>{

const vol=parseFloat(volumen.value)
const ratio=parseFloat(tipoTe.value)/110

const desp=3.2

const g=(vol*ratio)/(1+ratio*desp)
const a=vol-(g*desp)

gramos.innerText=g.toFixed(2)
agua.innerText=a.toFixed(2)

const tempMap={
"Blanco":"85-95°C",
"Verde":"80-85°C",
"Amarillo":"80-90°C",
"Oolong":"100°C",
"Pu erh Sheng":"95°C",
"Pu erh Shou":"100°C",
"Negro":"95°C"
}

const nombre=tipoTe.options[tipoTe.selectedIndex].text.split(" ")[0]

temp.innerText=tempMap[nombre]

}

calcular()

</script>

</body>
</html>
