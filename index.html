<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora Gong Fu Cha</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#667eea">

<style>
:root{--bg:#f4f6fb;--card:#ffffff;--text:#222;--primary:#667eea}
body.dark{--bg:#121212;--card:#1e1e1e;--text:#f5f5f5}
body{margin:0;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);padding:20px}
.container{max-width:800px;margin:auto;background:var(--card);padding:30px;border-radius:20px;box-shadow:0 20px 40px rgba(0,0,0,0.15)}

.mem-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:20px}

.mem-card{
  background:#eaeaea;
  padding:10px;
  border-radius:10px;
  text-align:center;
  cursor:default;
  user-select:none;
  transition:transform .25s ease;
}

.mem-card.dragging{
  opacity:.6;
  cursor:grabbing;
  z-index:10;
}

body.dark .mem-card{background:#2a2a2a}

.hidden{display:none}
</style>
</head>
<body>

<div class="container">
<h2>🍵 Gong Fu Cha</h2>
<h3>Mis Teteras</h3>
<div id="memorias" class="mem-grid"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, getDocs, updateDoc, doc, query, orderBy }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig={apiKey:"AIzaSyAnCT6glmf4n1zxzHJoHx4Z9l7yR0jju1I",authDomain:"calc-gong-fu.firebaseapp.com",projectId:"calc-gong-fu"};

const appFirebase=initializeApp(firebaseConfig);
const auth=getAuth(appFirebase);
const db=getFirestore(appFirebase);

let user=null;
let memorias=[];
let dragId=null;

onAuthStateChanged(auth,async(u)=>{
  if(u){user=u;cargarMemorias();}
});

async function cargarMemorias(){
  memorias=[];
  const q=query(collection(db,"usuarios",user.uid,"teteras"),orderBy("orden"));
  const snap=await getDocs(q);
  snap.forEach(d=>memorias.push({...d.data(),id:d.id}));
  render();
}

function render(){
  const cont=document.getElementById("memorias");

  // FLIP - First
  const firstPositions={};
  [...cont.children].forEach(el=>{
    firstPositions[el.dataset.id]=el.getBoundingClientRect();
  });

  cont.innerHTML="";

  memorias.forEach(m=>{
    const div=document.createElement("div");
    div.className="mem-card";
    div.draggable=true;
    div.dataset.id=m.id;
    div.textContent=`${m.nombre} (${m.vol}ml)`;

    div.ondragstart=()=>{
      dragId=m.id;
      div.classList.add("dragging");
    };

    div.ondragend=()=>{
      div.classList.remove("dragging");
    };

    div.ondragover=e=>e.preventDefault();
    div.ondrop=()=>reordenar(m.id);

    cont.appendChild(div);
  });

  // FLIP - Last + Invert + Play
  [...cont.children].forEach(el=>{
    const id=el.dataset.id;
    if(!firstPositions[id]) return;

    const last=el.getBoundingClientRect();
    const first=firstPositions[id];

    const dx=first.left-last.left;
    const dy=first.top-last.top;

    if(dx||dy){
      el.style.transform=`translate(${dx}px, ${dy}px)`;
      requestAnimationFrame(()=>{
        el.style.transform="";
      });
    }
  });
}

async function reordenar(targetId){
  if(dragId===targetId)return;

  const fromIndex=memorias.findIndex(m=>m.id===dragId);
  const toIndex=memorias.findIndex(m=>m.id===targetId);

  const moved=memorias.splice(fromIndex,1)[0];
  memorias.splice(toIndex,0,moved);

  render(); // animación inmediata tipo Trello

  for(let i=0;i<memorias.length;i++){
    await updateDoc(doc(db,"usuarios",user.uid,"teteras",memorias[i].id),{orden:i});
  }
}

</script>

</body>
</html>
