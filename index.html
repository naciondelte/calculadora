<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculadora de Té</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

</head>

<body>

<div class="topbar">

<div class="user-left">
<span id="userEmail"></span>
<button id="logoutBtn">Salir</button>
</div>

<button id="darkToggle"></button>

</div>

<h1>Calculadora de Té</h1>

<div id="loginScreen" class="screen">

<input id="email" placeholder="Correo">
<input id="password" type="password" placeholder="Contraseña">

<button id="loginBtn">Login</button>
<button id="registerBtn">Registrarse</button>
<button id="googleBtn">Google</button>

</div>

<div id="appScreen" class="screen hidden">

<div class="inputs">

<input id="volumen" type="number" placeholder="Volumen (ml)">

<select id="tipoTe">
<option value="5">Blanco</option>
<option value="4">Verde</option>
<option value="6">Amarillo</option>
<option value="7">Oolong</option>
<option value="8">Pu erh Sheng</option>
<option value="10">Pu erh Shou</option>
<option value="6">Negro</option>
<option value="manual">Ratio manual</option>
</select>

<input id="ratioManual" type="number" placeholder="g / 100ml" class="hidden">

<input id="temperatura" type="number" placeholder="Temperatura">

</div>

<div id="resultado" class="resultado"></div>

<h2>Memorias</h2>

<div id="memorias" class="memorias"></div>

<button id="addMemory">+</button>

</div>

<div id="modal" class="modal hidden">

<div class="modal-card">

<div class="icon-select">

<button id="iconSelector">

<img id="previewIcon" class="hidden">

<span id="iconPlus">+</span>

</button>

<div id="iconMenu" class="hidden">

<img src="icons/teapot.png" data-icon="teapot.png">
<img src="icons/gaiwan.png" data-icon="gaiwan.png">
<div data-icon="">+</div>

</div>

</div>

<input id="nombreMemoria" placeholder="Nombre">

<input id="volumenMemoria" type="number" placeholder="Volumen">

<div class="modal-buttons">

<button id="saveMemory">Aceptar</button>
<button id="deleteMemory">Eliminar</button>
<button id="cancelMemory">Cancelar</button>

</div>

</div>

</div>

<div id="installBanner" class="hidden"></div>

<script src="app.js"></script>

</body>
</html>
