<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora Gong Fu Cha</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#667eea">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="icon-192.png">

<style>
:root{--bg:#f4f6fb;--card:#ffffff;--text:#222;--primary:#667eea}
body.dark{--bg:#121212;--card:#1e1e1e;--text:#f5f5f5}

body{margin:0;font-family:'Segoe UI',system-ui;background:var(--bg);color:var(--text);padding:20px;transition:.25s}
.container{max-width:900px;margin:auto;background:var(--card);padding:30px;border-radius:20px;box-shadow:0 20px 40px rgba(0,0,0,.15)}

.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}

.mem-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:20px}

.mem-card{background:#eaeaea;padding:12px;border-radius:12px;text-align:center;border:2px solid transparent;transition:transform .18s ease, box-shadow .18s ease}
body.dark .mem-card{background:#2a2a2a}

.mem-card.dragging{transform:scale(1.05);box-shadow:0 15px 30px rgba(0,0,0,.3);z-index:10}
.mem-card.selected{border:2px solid var(--primary)}

.nombre{font-weight:600;margin-bottom:6px}
.volumen{font-size:13px;border-top:1px solid rgba(0,0,0,.2);padding-top:6px}

input,select,button{padding:10px;border-radius:8px;border:1px solid #ddd;font-size:14px}
button{background:var(--primary);color:white;border:none;font-weight:bold;cursor:pointer}

.volume-row{display:flex;gap:10px;margin-bottom:20px}
.volume-row input{flex:1}

.result-box{background:var(--primary);color:white;padding:20px;border-radius:12px;margin-top:20px}
.hidden{display:none}

.modal{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center}
.modal.hidden{display:none}
.modal-content{background:white;padding:20px;border-radius:12px;width:320px}
body.dark .modal-content{background:#1e1e1e;color:white}

</style>
</head>

<body>

<div class="container">

<div class="top-bar">
<h2>🍵 Calculadora Gong Fu Cha</h2>
<button onclick="toggleDark()">🌙</button>
</div>

<div id="authSection">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="register()">Regístrate</button>
<button onclick="googleLogin()" style="background:#db4437">Google</button>
</div>

<div id="app" class="hidden">

<h3>Mis Teteras</h3>
<div id="memorias" class="mem-grid"></div>

<h3>Volumen</h3>
<div class="volume-row">
<input type="number" id="volumen" value="100" oninput="calcular()">
<button onclick="abrirModal()">Guardar Tetera</button>
</div>

<h3>Tipo de Té</h3>
<select id="tipoTe" onchange="calcular()">
<option value="5">Blanco (5g/110ml)</option>
<option value="4">Verde (4g/110ml)</option>
<option value="6">Amarillo (6g/110ml)</option>
<option value="7" selected>Oolong (7g/110ml)</option>
<option value="8">Pu erh Sheng (8g/110ml)</option>
<option value="10">Pu erh Shou (10g/110ml)</option>
<option value="6">Negro (6g/110ml)</option>
</select>

<div class="result-box">
<p>Gramos de té: <strong id="gramos">0</strong> g</p>
<p>Agua útil: <strong id="agua">0</strong> ml</p>
<p>Temperatura recomendada: <strong id="temp">-</strong></p>
</div>

</div>
</div>

<div id="modal" class="modal hidden">
<div class="modal-content">
<h3 id="modalTitle">Guardar Tetera</h3>
<input id="nombreTetera" placeholder="Nombre">
<input id="modalVol" type="number" placeholder="Volumen (ml)">
<div style="display:flex;gap:10px;margin-top:10px">
<button onclick="guardarMemoria()">Aceptar</button>
<button onclick="eliminarMemoria()" style="background:#c0392b">Eliminar</button>
</div>
<button onclick="cerrarModal()" style="margin-top:10px;background:gray">Cancelar</button>
</div>
</div>

<script>
function toggleDark(){
 document.body.classList.toggle('dark');
 localStorage.setItem('darkMode',document.body.classList.contains('dark'))
}
if(localStorage.getItem('darkMode')==='true')document.body.classList.add('dark')
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, updateDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig={apiKey:"AIzaSyAnCT6glmf4n1zxzHJoHx4Z9l7yR0jju1I",authDomain:"calc-gong-fu.firebaseapp.com",projectId:"calc-gong-fu"};

const appFirebase=initializeApp(firebaseConfig);
const auth=getAuth(appFirebase);
const db=getFirestore(appFirebase);
const provider=new GoogleAuthProvider();

let user=null;
let memorias=[];
let dragId=null;
let editId=null;

onAuthStateChanged(auth,async(u)=>{
 if(u){
  user=u;
  authSection.style.display="none";
  app.classList.remove("hidden");
  cargarMemorias();
 }else{
  authSection.style.display="block";
  app.classList.add("hidden");
 }
});

window.login=()=>signInWithEmailAndPassword(auth,email.value,password.value);
window.register=()=>createUserWithEmailAndPassword(auth,email.value,password.value);
window.googleLogin=()=>signInWithPopup(auth,provider);

async function cargarMemorias(){
 memorias=[];
 const q=query(collection(db,"usuarios",user.uid,"teteras"),orderBy("orden"));
 const snap=await getDocs(q);
 snap.forEach(d=>memorias.push({...d.data(),id:d.id}));
 render();
}

function render(){
 const cont=memoriasDiv();
 const firstRects={};
 cont.querySelectorAll('.mem-card').forEach(el=>{
   firstRects[el.dataset.id]=el.getBoundingClientRect();
 });

 cont.innerHTML="";
 memorias.forEach(m=>{
  const div=document.createElement("div");
  div.className="mem-card";
  div.dataset.id=m.id;

  const nombre=document.createElement("div");
  nombre.className="nombre";
  nombre.textContent=m.nombre;

  const volumen=document.createElement("div");
  volumen.className="volumen";
  volumen.textContent=m.vol+" ml";

  div.appendChild(nombre);
  div.appendChild(volumen);

  div.onclick=()=>{
    document.getElementById("volumen").value=m.vol;
    calcular();
    document.querySelectorAll('.mem-card').forEach(c=>c.classList.remove('selected'));
    div.classList.add('selected');
  };

  div.ondblclick=()=>abrirModalEdicion(m);

  div.onpointerdown=()=>{
    dragId=m.id;
    div.classList.add("dragging");
    if(navigator.vibrate)navigator.vibrate(20);
  };

  div.onpointerup=()=>{
    div.classList.remove("dragging");
    guardarOrden();
  };

  div.onpointerenter=()=>{
    if(!dragId||dragId===m.id)return;
    const from=memorias.findIndex(x=>x.id===dragId);
    const to=memorias.findIndex(x=>x.id===m.id);
    const moved=memorias.splice(from,1)[0];
    memorias.splice(to,0,moved);
    render();
  };

  cont.appendChild(div);
 });

 requestAnimationFrame(()=>{
  cont.querySelectorAll('.mem-card').forEach(el=>{
    const id=el.dataset.id;
    if(firstRects[id]){
      const last=el.getBoundingClientRect();
      const dx=firstRects[id].left-last.left;
      const dy=firstRects[id].top-last.top;
      el.animate([
        {transform:`translate(${dx}px,${dy}px)`},
        {transform:'translate(0,0)'}
      ],{duration:180,easing:'ease-out'});
    }
  });
 });
}

function memoriasDiv(){return document.getElementById("memorias");}

async function guardarOrden(){
 for(let i=0;i<memorias.length;i++){
  await updateDoc(doc(db,"usuarios",user.uid,"teteras",memorias[i].id),{orden:i});
 }
}

window.abrirModal=()=>{
 editId=null;
 modalTitle.innerText="Guardar Tetera";
 nombreTetera.value="";
 modalVol.value=volumen.value;
 modal.classList.remove("hidden");
};

function abrirModalEdicion(m){
 editId=m.id;
 modalTitle.innerText="Editar Tetera";
 nombreTetera.value=m.nombre;
 modalVol.value=m.vol;
 modal.classList.remove("hidden");
}

window.cerrarModal=()=>modal.classList.add("hidden");

window.guardarMemoria=async()=>{
 const nombre=nombreTetera.value.trim();
 const vol=parseFloat(modalVol.value);
 if(!nombre||!vol)return;
 if(editId){
  await updateDoc(doc(db,"usuarios",user.uid,"teteras",editId),{nombre,vol});
 }else{
  await addDoc(collection(db,"usuarios",user.uid,"teteras"),{nombre,vol,orden:memorias.length});
 }
 cerrarModal();
 cargarMemorias();
};

window.eliminarMemoria=async()=>{
 if(!editId)return;
 await deleteDoc(doc(db,"usuarios",user.uid,"teteras",editId));
 cerrarModal();
 cargarMemorias();
};

window.calcular=()=>{
 const vol=parseFloat(volumen.value);
 const ratio=parseFloat(tipoTe.value)/110;
 const desp=3.2;
 const g=(vol*ratio)/(1+ratio*desp);
 const a=vol-(g*desp);
 gramos.innerText=g.toFixed(2);
 agua.innerText=a.toFixed(2);

 const temps={
  "Blanco (5g/110ml)":"85-95°C",
  "Verde (4g/110ml)":"80-85°C",
  "Amarillo (6g/110ml)":"80-90°C",
  "Oolong (7g/110ml)":"100°C",
  "Pu erh Sheng (8g/110ml)":"95°C",
  "Pu erh Shou (10g/110ml)":"100°C",
  "Negro (6g/110ml)":"95°C"
 };
 temp.innerText=temps[tipoTe.options[tipoTe.selectedIndex].text];
};

calcular();

</script>

</body>
</html>
