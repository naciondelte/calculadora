<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora Gong Fu Cha</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#667eea">

<style>
:root {
  --bg:#f4f6fb;
  --card:#ffffff;
  --text:#222;
  --primary:#667eea;
}

body.dark{
  --bg:#121212;
  --card:#1e1e1e;
  --text:#f5f5f5;
}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg);
  color:var(--text);
  padding:20px;
}

.container{
  max-width:750px;
  margin:auto;
  background:var(--card);
  padding:30px;
  border-radius:20px;
  box-shadow:0 20px 40px rgba(0,0,0,0.15);
}

.top-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

h3{ margin-bottom:8px; }

input,select,button{
  padding:12px;
  border-radius:8px;
  border:1px solid #ddd;
  font-size:15px;
}

button{
  background:var(--primary);
  color:white;
  font-weight:bold;
  border:none;
  cursor:pointer;
}

.small-btn{ padding:8px 12px; font-size:14px; }

/* GRID MEMORIAS */
.mem-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:10px;
  margin-bottom:20px;
}

.mem-card{
  background:#eaeaea;
  padding:10px;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
}

body.dark .mem-card{ background:#2a2a2a; }

.mem-card.dragging{ opacity:0.5; }

.volume-row{
  display:flex;
  gap:10px;
  align-items:center;
}

.volume-row input{ flex:1; }

.result-box{
  background:var(--primary);
  color:white;
  padding:20px;
  border-radius:12px;
  margin-top:20px;
}

.switch-row{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:10px;
}

.hidden{ display:none; }

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  display:flex;
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:white;
  padding:20px;
  border-radius:12px;
  width:300px;
}

body.dark .modal-content{ background:#1e1e1e; color:white; }

</style>
</head>
<body>

<div class="container">
<div class="top-bar">
<h2>🍵 Gong Fu Cha</h2>
<button class="small-btn" onclick="toggleDark()">🌙</button>
</div>

<!-- MEMORIAS -->
<h3>Mis Teteras</h3>
<div id="memorias" class="mem-grid"></div>

<!-- VOLUMEN -->
<h3>Volumen</h3>
<div class="volume-row">
<input type="number" id="volumen" value="100" oninput="calcular()">
<button onclick="abrirModal()">Guardar Tetera</button>
</div>

<!-- TIPO TE -->
<h3>Tipo de Té</h3>
<select id="tipoTe" onchange="calcular()">
<option value="5">Blanco (5 g/110ml)</option>
<option value="4">Verde (4 g/110ml)</option>
<option value="6">Amarillo (6 g/110ml)</option>
<option value="7" selected>Oolong (7 g/110ml)</option>
<option value="8">Pu erh Sheng (8 g/110ml)</option>
<option value="10">Pu erh Shou (10 g/110ml)</option>
<option value="6">Negro (6 g/110ml)</option>
</select>

<div class="switch-row">
<label>Ratio manual</label>
<input type="checkbox" id="ratioSwitch" onchange="toggleManual()">
</div>

<div id="manualBox" class="hidden">
<input type="number" id="manualGr" placeholder="Gramos" oninput="calcular()">
<input type="number" id="manualMl" placeholder="Ml" oninput="calcular()">
</div>

<div class="result-box">
<p>Gramos: <strong id="gramos">0</strong> g</p>
<p>Agua útil: <strong id="agua">0</strong> ml</p>
<p>Temperatura recomendada: <strong id="temp">-</strong></p>
</div>
</div>

<!-- MODAL -->
<div id="modal" class="modal hidden">
<div class="modal-content">
<h3>Nombre de la tetera</h3>
<input type="text" id="nombreTetera">
<button onclick="guardarMemoria()">Guardar</button>
<button onclick="cerrarModal()">Cancelar</button>
</div>
</div>

<script>
let memorias=[];
let dragIndex=null;

function renderMemorias(){
  memorias.sort((a,b)=>a.orden-b.orden);
  memoriasDiv=memoriasEl();
  memoriasDiv.innerHTML="";
  memorias.forEach((m,i)=>{
    const div=document.createElement("div");
    div.className="mem-card";
    div.draggable=true;
    div.textContent=`${m.nombre} (${m.vol}ml)`;
    div.onclick=()=>{ volumen.value=m.vol; calcular(); };
    div.ondragstart=()=>{ dragIndex=i; div.classList.add("dragging"); };
    div.ondragend=()=>div.classList.remove("dragging");
    div.ondragover=e=>e.preventDefault();
    div.ondrop=()=>reordenar(i);
    memoriasDiv.appendChild(div);
  });
}

function reordenar(i){
  const item=memorias.splice(dragIndex,1)[0];
  memorias.splice(i,0,item);
  memorias.forEach((m,idx)=>m.orden=idx);
  renderMemorias();
}

function memoriasEl(){ return document.getElementById("memorias"); }

function abrirModal(){ modal.classList.remove("hidden"); }
function cerrarModal(){ modal.classList.add("hidden"); }

function guardarMemoria(){
  const nombre=nombreTetera.value.trim();
  if(!nombre) return;
  memorias.push({nombre,vol:parseFloat(volumen.value),orden:memorias.length});
  nombreTetera.value="";
  cerrarModal();
  renderMemorias();
}

function toggleManual(){
  manualBox.classList.toggle("hidden");
  calcular();
}

function calcular(){
  const vol=parseFloat(volumen.value);
  let ratio;

  if(ratioSwitch.checked){
    const g=parseFloat(manualGr.value);
    const ml=parseFloat(manualMl.value);
    if(g&&ml) ratio=g/ml;
  }else{
    ratio=parseFloat(tipoTe.value)/110;
  }

  if(!ratio){ gramos.innerText="0"; agua.innerText="0"; return; }

  const desplazamiento=3.2;
  const gramosCalc=(vol*ratio)/(1+ratio*desplazamiento);
  const aguaCalc=vol-(gramosCalc*desplazamiento);

  gramos.innerText=gramosCalc.toFixed(2);
  agua.innerText=aguaCalc.toFixed(2);

  const tipoTexto=tipoTe.options[tipoTe.selectedIndex].text;
  const temps={
    "Blanco (5 g/110ml)":"85-95°C",
    "Verde (4 g/110ml)":"80-85°C",
    "Amarillo (6 g/110ml)":"80-90°C",
    "Oolong (7 g/110ml)":"100°C",
    "Pu erh Sheng (8 g/110ml)":"95°C",
    "Pu erh Shou (10 g/110ml)":"100°C",
    "Negro (6 g/110ml)":"95°C"
  };
  temp.innerText=temps[tipoTexto]||"-";
}

function toggleDark(){ document.body.classList.toggle("dark"); }

calcular();
</script>
</body>
</html>
